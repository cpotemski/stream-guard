<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stream Guard</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="popup-body">
    <main class="popup">
      <header class="popup-header">
        <h1 class="popup-title">
          Stream Guar<button
            id="diagnostics-toggle"
            type="button"
            class="title-debug-toggle"
            aria-label="Diagnose anzeigen oder ausblenden"
            title="Diagnose anzeigen oder ausblenden"
          >d</button>
        </h1>
        <label class="watch-toggle" aria-label="Watch Group aktivieren">
          <input id="watch-toggle" type="checkbox">
          <span class="watch-toggle-slider" aria-hidden="true"></span>
        </label>
      </header>

      <section class="panel">
        <div class="section-title">Wichtige Channels</div>
        <ul id="channel-list" class="channel-list"></ul>
        <p id="empty-state" class="empty-state">Noch keine Channels markiert.</p>
      </section>

      <section id="diagnostics-panel" class="panel panel-debug" hidden>
        <div class="section-title">Diagnose</div>
        <p id="telemetry-status" class="telemetry-status">Logs werden geladen...</p>
        <div class="telemetry-actions">
          <button id="telemetry-export" type="button" class="control-button telemetry-button">
            Export JSON
          </button>
          <button id="telemetry-clear" type="button" class="control-button telemetry-button">
            Logs leeren
          </button>
        </div>
      </section>
    </main>

    <script src="lib/channelState.js"></script>
    <script type="module" src="popup.js"></script>
  </body>
</html>
